<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f12c1313f0.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
      integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body>
    <div class="page min-h-screen container">
      <div id="stars"></div>
      <div id="stars2"></div>
      <div id="stars3"></div>
      <header class="bg-[#0A0A08] text-white">
        <div
          id="nav-wrapper"
          class="flex items-center justify-between max-w-7xl mx-auto h-16"
        >
          <div class="nav-logo font-bold text-2xl cursor-pointer">AXIOM</div>
          <nav class="nav-links flex gap-10 text-white/50">
            <a href="#" class="hover:text-white transition-all duration-500"
              >Work</a
            >
            <a href="#" class="hover:text-white transition-all duration-500"
              >Studio</a
            >
            <a href="#" class="hover:text-white transition-all duration-500"
              >Journal</a
            >
          </nav>
          <button
            class="nav-cta bg-[#C8F04A] text-black font-medium cursor-pointer px-4 py-2 rounded-full"
          >
            Get started
          </button>
        </div>
      </header>

      <main class="flex items-center justify-center min-h-[80vh]">
        <div class="text-center max-w-7xl">
          <h1
            class="text-7xl font-extrabold text-white leading-tight mb-6 max-w-4xl"
          >
            We are a
            <span class="text-[#C8F04A] italic font-bold">design</span> studio
            crafting
            <span class="text-[#C8F04A] italic font-bold">exceptional</span>
            experiences
          </h1>
          <p class="text-xl max-w-2xl mx-auto text-white/70 mb-10">
            We combine strategy, design, and technology to create engaging
            digital products. Our team of experts work closely with clients to
            deliver innovative solutions that drive results.
          </p>
          <div class="hero-btns">
            <button
              class="bg-[#C8F04A] text-black font-medium cursor-pointer px-6 py-3 rounded-full"
            >
              View our work
              <!-- Add font awesome arrow icon -->
              <i class="fas fa-arrow-right ml-2"></i>
            </button>
            <button
              class="border-2 border-[#C8F04A] text-[#C8F04A] font-medium cursor-pointer px-6 py-3 rounded-full ml-4"
            >
              Contact us
            </button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
