<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG String Animation</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
      /* Gradient text — cannot be done with Tailwind */
      #middle-text h1 {
        font-size: 5vw;
        white-space: nowrap;
        background: linear-gradient(90deg, #a855f7, #ec4899, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* SVG path stroke width */
      svg path {
        stroke-width: 1.5px;
        transition: stroke 0.3s ease;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  </head>

  <body
    class="bg-[#111] w-full min-h-screen flex flex-col items-center justify-center"
  >
    <!-- STRING 1 — top line -->
    <div id="string1" class="w-full flex items-center justify-center ">
      <svg width="100%" height="120" viewBox="0 0 1000 120" class="">
        <path d="M 10 60 Q 500 60 990 60" stroke="white" fill="transparent" />
      </svg>
    </div>

    <!-- TEXT BETWEEN STRINGS -->
    <div id="middle-text" class="w-full flex items-center justify-center py-6">
      <h1 class="font-black tracking-tight uppercase">We Build Brands</h1>
    </div>

    <!-- STRING 2 — bottom line -->
    <div id="string2" class="w-full flex items-center justify-center">
      <svg width="100%" height="120" viewBox="0 0 1000 120">
        <path d="M 10 60 Q 500 60 990 60" stroke="white" fill="transparent" />
      </svg>
    </div>

    <script src="script.js"></script>
  </body>
</html>
