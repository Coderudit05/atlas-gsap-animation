<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Animation</title>

    <style>
      * {
        cursor: none;
      }

      #cursor {
        mix-blend-mode: difference;
      }

      .scale-cursor {
        background: white;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-black text-white">
    <div
      id="cursor"
      class="w-[50px] h-[50px] fixed rounded-full border-2 border-white pointer-events-none z-[9999]"
    ></div>

    <div class="min-h-screen flex items-center justify-center bg-[#E8DDB5]">
      <button
        id="button"
        class="bg-[#745296] px-8 py-4 text-white rounded-none font-bold"
      >
        Hover Me
      </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="preview.js"></script>
  </body>
</html>
